appId: com.hanbroz.claudedeck.companion
productName: Claude Deck Companion
copyright: Copyright (c) Hanbroz
directories:
  output: dist/companion
files:
  - "dist/companion/app/**/*"
  - "package.json"
asar: true
asarUnpack:
  - "**/node-pty/**"
# The local `companion:dir` path reuses the checked-in/prebuilt node-pty binary.
# Release packaging runs `companion:rebuild` first and therefore still produces
# an Electron-matched native module.
npmRebuild: false
win:
  icon: companion/assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "Claude Deck Companion Setup ${version}.${ext}"
nsis:
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: false
  include: companion/packaging/nsis/wt-prerequisite.nsh
extraResources:
  - from: dist/com.hanbroz.claude-usage.streamDeckPlugin
    to: com.hanbroz.claude-usage.streamDeckPlugin
  - from: docs/INSTALL_WINDOWS_KO.html
    to: INSTALL_WINDOWS_KO.html
