<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Companion</title>
    <link rel="stylesheet" href="./index.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app-shell" class="app-shell">
      <header class="titlebar" aria-label="Application title bar">
        <div class="titlebar__brand">
          <span class="titlebar__logo" aria-hidden="true"></span>
          <span>STREAM DECK TERMINAL</span>
          <span class="titlebar__divider">-</span>
          <strong id="title-project-name">project</strong>
        </div>
        <div class="window-controls" aria-label="Window controls">
          <button id="window-minimize" class="window-control" type="button" title="Minimize" aria-label="Minimize">
            <svg viewBox="0 0 11 11" aria-hidden="true"><path d="M0 5.5h11" /></svg>
          </button>
          <button id="window-maximize" class="window-control" type="button" title="Maximize" aria-label="Maximize">
            <svg viewBox="0 0 10 10" aria-hidden="true"><rect x=".5" y=".5" width="9" height="9" /></svg>
          </button>
          <button id="window-close" class="window-control" type="button" title="Close" aria-label="Close">
            <svg viewBox="0 0 11 11" aria-hidden="true"><path d="M0 0 11 11M11 0 0 11" /></svg>
          </button>
        </div>
      </header>

      <div class="body-shell">
        <button id="explorer-rail" class="explorer-rail" type="button" title="Open explorer" aria-label="Open explorer" hidden>
          <span aria-hidden="true">EX</span>
        </button>

        <aside id="sidebar" class="sidebar" aria-label="Project explorer">
          <header class="sidebar__header">
            <button id="explorer-toggle" class="explorer-title" type="button" title="Close explorer">
              <span aria-hidden="true">&gt;</span>
              <strong id="explorer-project-name">PROJECT</strong>
            </button>
            <div class="explorer-actions">
              <button id="open-explorer" class="icon-button icon-button--small" type="button" title="Open folder" aria-label="Open folder">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5h7l2 2h9v12a1 1 0 0 1-1 1H3z" /></svg>
              </button>
              <button id="open-terminal" class="icon-button icon-button--small" type="button" title="Open project terminal" aria-label="Open project terminal">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 8 4 4-4 4M12 16h7" /></svg>
              </button>
              <button id="new-session" class="icon-button icon-button--small" type="button" title="New Claude session" aria-label="New Claude session">+</button>
            </div>
          </header>

          <section class="status-panel" aria-label="Session status" hidden>
            <div>
              <span class="status-dot" id="status-dot"></span>
              <strong id="session-state">Idle</strong>
            </div>
            <span id="session-model">Claude Code</span>
          </section>

          <section class="resume-panel" aria-label="Resume session" hidden>
            <input id="resume-session-id" type="text" spellcheck="false" placeholder="Session ID" aria-label="Session ID to resume" />
            <button id="resume-session" type="button">Resume</button>
          </section>

          <section id="tree" class="tree" aria-label="File tree"></section>
        </aside>
        <div id="explorer-resizer" class="explorer-resizer" aria-hidden="true"></div>

        <section class="workspace" aria-label="Claude Code workspace">
          <nav class="session-tabs" aria-label="Session header">
            <div class="session-tab session-tab--active">
              <span id="session-tab-dot" class="tab-dot"></span>
              <span>Claude Console</span>
            </div>
            <button id="terminal-split-toggle" class="session-tab session-tab--button" type="button" title="Toggle embedded terminal">
              <span>TERMINAL</span>
              <span id="terminal-split-sign">+</span>
            </button>
            <div class="session-tabs__meta">
              <span id="tab-model">Claude Code</span>
              <span id="tab-context">CTX --</span>
              <span id="tab-project-name">project</span>
            </div>
          </nav>

          <div class="work-split">
            <section class="console-pane" aria-label="Read-only Claude console">
              <div id="console-log" class="console-log" aria-live="polite" aria-readonly="true"></div>
            </section>

            <div id="terminal-resizer" class="terminal-resizer" aria-hidden="true"></div>

            <section id="terminal-panel" class="terminal-panel" aria-label="Embedded terminal">
              <header class="terminal-panel__header">
                <span>Embedded terminal</span>
                <button id="terminal-panel-close" class="icon-button icon-button--small" type="button" title="Close terminal panel" aria-label="Close terminal panel">x</button>
              </header>
              <div class="terminal-panel__content">
                <div id="terminal" class="terminal" aria-label="Interactive embedded terminal"></div>
              </div>
            </section>
          </div>

          <footer class="composer" aria-label="Prompt composer">
            <div id="image-preview" class="image-preview" aria-live="polite"></div>
            <div class="composer__row">
              <textarea
                id="prompt-input"
                rows="8"
                spellcheck="false"
                placeholder="Write to Claude Code. Enter sends, Shift+Enter inserts a new line."
                aria-label="Prompt input"
              ></textarea>
            </div>
          </footer>
        </section>
      </div>
    </main>

    <div id="context-menu" class="context-menu" role="menu" hidden>
      <div id="context-menu-title" class="context-menu__title">PROJECT</div>
      <button data-action="new-file" type="button" role="menuitem"><span>F</span>New File</button>
      <button data-action="new-folder" type="button" role="menuitem"><span>D</span>New Folder</button>
      <button data-action="refresh" type="button" role="menuitem"><span>R</span>Refresh</button>
      <button data-action="show-explorer" type="button" role="menuitem"><span>E</span>Reveal in Explorer</button>
      <button data-action="open-terminal" type="button" role="menuitem"><span>T</span>Open Terminal Here</button>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <script type="module" src="./index.js"></script>
  </body>
</html>
