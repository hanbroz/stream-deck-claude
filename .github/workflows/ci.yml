name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run typecheck

      - name: Build plugin
        run: npm run build

      - name: Verify status-line bridge
        run: npm run verify:bridge

      - name: Validate manifest
        run: npm run validate

      - name: Package plugin
        run: npm run pack

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-stream-deck-plugin
          path: dist/com.hanbroz.claude-usage.streamDeckPlugin
          if-no-files-found: error
